name: Deploy WireGuard VPN for YouTube/Instagram Access

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary
    
    - name: Deploy WireGuard to Server
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      run: |
        ssh -o StrictHostKeyChecking=no $SSH_USERNAME@$SERVER_IP << EOF
          # به‌روزرسانی سیستم
          sudo apt update && sudo apt upgrade -y
          
          # نصب Docker اگر وجود نداره (docker.io برای Ubuntu)
          if ! command -v docker &> /dev/null; then
            sudo apt install -y docker.io
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker $USER  # اضافه کردن کاربر به گروه docker
          fi
          
          # نصب Docker Compose اگر وجود نداره (v2 از docker plugin)
          if ! docker compose version &> /dev/null; then
            sudo apt install -y docker-compose-plugin
          fi
          
          # فعال کردن IP forwarding در host
          echo 'net.ipv4.ip_forward=1' | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          
          # دایرکتوری و فایل docker-compose.yml
          mkdir -p ~/wireguard
          cd ~/wireguard
          
          # پاک کردن config قدیمی اگر وجود داره
          rm -rf config
          mkdir config
          
          cat > docker-compose.yml << COMPOSE
version: "3.8"
services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tehran
      - SERVERURL=$SERVER_IP  # IP سرور (حالا expand می‌شه)
      - SERVERPORT=51820
      - PEERS=1  # تعداد کلاینت‌ها
      - PEERDNS=8.8.8.8,1.1.1.1  # DNS برای دور زدن فیلترینگ
      - LOG_CONFS=true  # لاگ configها رو فعال کن
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    privileged: true  # برای دسترسی شبکه
    security_opt:
      - no-new-privileges:true  # امنیت بیشتر
COMPOSE
          
          # راه‌اندازی (با docker compose v2)
          docker compose down  # اگر اجرا شده، خاموش کن
          docker compose up -d
          
          # منتظر آماده شدن (تا config تولید بشه)
          sleep 20
          
          # چک وضعیت
          docker logs wireguard | tail -n 10
          
          # نمایش config کلاینت
          if [ -f /config/peer1/peer1.conf ]; then
            echo "Config کلاینت (peer1.conf):"
            cat ~/wireguard/config/peer1/peer1.conf
            echo ""
            echo "فایل QR در: ~/wireguard/config/peer1/peer1.png"
            echo "برای دانلود: scp $USER@$SERVER_IP:~/wireguard/config/peer1/peer1.conf ."
          else
            echo "خطا: config تولید نشده. لاگ‌ها رو چک کن."
            docker logs wireguard
          fi
        EOF
