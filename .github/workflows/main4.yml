name: Deploy WireGuard VPN (Direct Install, No Docker)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary
    
    - name: Deploy WireGuard to Server
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      run: |
        ssh -o StrictHostKeyChecking=no $SSH_USERNAME@$SERVER_IP << EOF
          # به‌روزرسانی سیستم
          sudo apt update && sudo apt upgrade -y
          
          # نصب WireGuard (برای Ubuntu/Debian)
          sudo apt install -y wireguard wireguard-tools
          
          # اگر kernel قدیمی باشه، dkms برای module (اختیاری، اگر ارور داد)
          if ! modprobe wireguard; then
            sudo apt install -y linux-headers-\$(uname -r)
            sudo apt install -y wireguard-dkms
            sudo modprobe wireguard
          fi
          
          # فعال کردن IP forwarding
          echo 'net.ipv4.ip_forward=1' | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          
          # فایروال: باز کردن پورت (اگر UFW فعاله)
          sudo ufw allow 51820/udp || true  # اگر UFW نصب نباشه، رد کن
          
          # پاک کردن config قدیمی
          sudo wg-quick down wg0 || true
          sudo rm -f /etc/wireguard/wg0.conf
          sudo rm -rf /etc/wireguard/peer*
          
          # ایجاد دایرکتوری
          sudo mkdir -p /etc/wireguard
          cd /etc/wireguard
          
          # تولید کلیدهای سرور
          SERVER_PRIVKEY=\$(wg genkey)
          SERVER_PUBKEY=\$(echo \$SERVER_PRIVKEY | wg pubkey)
          
          # تولید کلیدهای کلاینت (peer1)
          CLIENT_PRIVKEY=\$(wg genkey)
          CLIENT_PUBKEY=\$(echo \$CLIENT_PRIVKEY | wg pubkey)
          
          # IPهای VPN (سابنت 10.13.13.0/24)
          SERVER_VPN_IP=10.13.13.1/24
          CLIENT_VPN_IP=10.13.13.2/24
          
          # فایل config سرور (wg0.conf)
          cat > wg0.conf << CONF
[Interface]
Address = $SERVER_VPN_IP
PrivateKey = $SERVER_PRIVKEY
ListenPort = 51820
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
PublicKey = $CLIENT_PUBKEY
AllowedIPs = $CLIENT_VPN_IP
CONF
          
          sudo chmod 600 wg0.conf
          
          # config کلاینت (peer1.conf) – برای دانلود
          cat > peer1.conf << CLIENTCONF
[Interface]
PrivateKey = $CLIENT_PRIVKEY
Address = $CLIENT_VPN_IP
DNS = 8.8.8.8, 1.1.1.1

[Peer]
PublicKey = $SERVER_PUBKEY
AllowedIPs = 0.0.0.0/0
Endpoint = $SERVER_IP:51820
PersistentKeepalive = 25
CLIENTCONF
          
          # راه‌اندازی WireGuard
          sudo wg-quick up wg0
          sudo systemctl enable wg-quick@wg0
          
          # چک وضعیت
          sudo wg show
          
          # نمایش config کلاینت
          echo "Config کلاینت (peer1.conf) برای یوتیوب/اینستاگرام:"
          cat /etc/wireguard/peer1.conf
          echo ""
          echo "این فایل رو دانلود کن: scp $SSH_USERNAME@$SERVER_IP:/etc/wireguard/peer1.conf ."
          echo "در اپ WireGuard import کن. تمام ترافیک (0.0.0.0/0) از VPN عبور می‌کنه و DNS خارجی ست شده."
          echo ""
          echo "وضعیت: sudo wg show wg0"
          echo "خاموش/روشن: sudo wg-quick down/up wg0"
        EOF
