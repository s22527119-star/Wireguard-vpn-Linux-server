name: Deploy WireGuard VPN for YouTube/Instagram Access

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary
    
    - name: Deploy WireGuard to Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SERVER_IP }} << 'EOF'
          # به‌روزرسانی و نصب Docker (همون قبلی)
          sudo apt update && sudo apt upgrade -y
          
          if ! command -v docker &> /dev/null; then
            sudo apt install -y docker.io docker-compose
            sudo systemctl start docker
            sudo systemctl enable docker
          fi
          
          # دایرکتوری و فایل docker-compose.yml
          mkdir -p ~/wireguard
          cd ~/wireguard
          
          cat > docker-compose.yml << 'COMPOSE'
version: "3.8"
services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tehran
      - SERVERURL=${{ secrets.SERVER_IP }}  # IP سرور رو از secrets بگیر (در workflow واقعی، از env استفاده کن)
      - SERVERPORT=51820
      - PEERS=1  # تعداد کلاینت‌ها؛ برای بیشتر، افزایش بده
      - PEERDNS=8.8.8.8,1.1.1.1  # DNS گوگل و کلادفلر برای دور زدن فیلترینگ
      - INTERNAL_SUBNET=10.13.13.0  # سابنت داخلی VPN
      - ALLOWEDIPS=0.0.0.0/0  # تمام ترافیک رو از VPN عبور بده (برای دسترسی کامل)
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1  # فعال کردن فورواردینگ IP برای VPN
    dns:  # DNS کانتینر
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    privileged: true  # برای دسترسی کامل به شبکه (اختیاری، اما برای پایداری خوبه)
COMPOSE
          
          # راه‌اندازی
          docker-compose down
          docker-compose up -d
          
          # منتظر آماده شدن
          sleep 10
          
          # نمایش config کلاینت (برای QR یا فایل conf)
          echo "Config کلاینت (peer1):"
          docker exec wireguard cat /config/peer1/peer1.conf
          echo "QR کد در: /config/peer1/peer1.png (با اسکنر QR اسکن کن)"
        EOF
