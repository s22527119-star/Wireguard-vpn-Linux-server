name: WireGuard Server with SSH Reverse Tunnel

on:
  workflow_dispatch:

jobs:
  vpn-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Start WireGuard Server
        run: |
          mkdir -p ~/wireguard
          
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e SERVERURL=${{ secrets.IRAN_SERVER_IP }} \
            -e SERVERPORT=${{ secrets.IRAN_SERVER_PORT }} \
            -e PEERS=5 \
            -e PEERDNS=8.8.8.8 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          sleep 20
          echo "WireGuard server started"

      - name: Create SSH Reverse Tunnel (Fixed)
        run: |
          # تنظیم SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.IRAN_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # اضافه کردن host key
          ssh-keyscan -H ${{ secrets.IRAN_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          
          # روش صحیح SSH reverse tunnel
          # توجه: فرمت درست -R [remote_port]:localhost:[local_port]
          
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            -o TCPKeepAlive=yes \
            -N -f \
            -R ${{ secrets.IRAN_SERVER_PORT }}:localhost:51820 \
            ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }}
          
          sleep 5
          
          # بررسی موفقیت‌آمیز بودن تونل
          if ps aux | grep "ssh.*-R" | grep -v grep; then
            echo "========================================="
            echo "✅ Reverse tunnel established!"
            echo "WireGuard Endpoint: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
            echo "========================================="
          else
            echo "❌ Tunnel failed! Check SSH credentials"
            exit 1
          fi

      - name: Show Client Configs
        run: |
          echo "========================================="
          echo "Client Configurations"
          echo "========================================="
          echo ""
          
          sudo find ~/wireguard -name "peer*.conf" -type f | while read conf; do
            echo "----------------------------------------"
            echo "Config: $(basename $conf)"
            echo "----------------------------------------"
            sudo cat "$conf"
            echo ""
          done
          
          echo ""
          echo "⚠️  IMPORTANT: Change Endpoint in configs to:"
          echo "   Endpoint = ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
          echo ""

      - name: Monitor and Keep Alive
        run: |
          echo "========================================="
          echo "Server Active - Keep this running"
          echo "Endpoint: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
          echo "========================================="
          echo ""
          
          # Keep alive with monitoring
          for i in $(seq 1 72); do
            minutes=$((i * 5))
            echo "[$(date '+%H:%M:%S')] Uptime: $minutes minutes"
            
            # Check WireGuard
            if docker exec wireguard wg show 2>/dev/null | grep -q "interface"; then
              echo "  WireGuard: ✅ Running"
            else
              echo "  WireGuard: ❌ Failed"
            fi
            
            # Check SSH tunnel
            if ps aux | grep -q "ssh.*-R.*51820"; then
              echo "  SSH Tunnel: ✅ Active"
            else
              echo "  SSH Tunnel: ❌ Disconnected"
              # تلاش مجدد برای اتصال
              echo "  Reconnecting..."
              ssh \
                -o StrictHostKeyChecking=accept-new \
                -o ServerAliveInterval=60 \
                -o ConnectTimeout=10 \
                -N -f \
                -R ${{ secrets.IRAN_SERVER_PORT }}:localhost:51820 \
                ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }} 2>/dev/null
            fi
            
            echo ""
            sleep 300  # 5 دقیقه
          done
