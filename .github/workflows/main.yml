name: WireGuard with AutoSSH (Stable)

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup WireGuard
        run: |
          mkdir -p ~/wireguard
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            -e PEERS=5 \
            -e SERVERURL=${{ secrets.IRAN_SERVER_IP }} \
            -e SERVERPORT=${{ secrets.IRAN_SERVER_PORT }} \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            linuxserver/wireguard:latest
          
          sleep 25

      - name: Install and Setup AutoSSH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autossh
          
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.IRAN_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add host key to avoid prompt
          ssh-keyscan -H ${{ secrets.IRAN_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Start AutoSSH Tunnel
        run: |
          # Kill any existing autossh
          pkill autossh 2>/dev/null || true
          
          # Start autossh with correct format
          AUTOSSH_PIDFILE=/tmp/autossh.pid \
          AUTOSSH_POLL=30 \
          AUTOSSH_GATETIME=10 \
          AUTOSSH_FIRST_POLL=10 \
          autossh \
            -M 0 \
            -o "StrictHostKeyChecking=accept-new" \
            -o "ServerAliveInterval=30" \
            -o "ServerAliveCountMax=3" \
            -o "ExitOnForwardFailure=yes" \
            -o "TCPKeepAlive=yes" \
            -N \
            -R ${{ secrets.IRAN_SERVER_PORT }}:localhost:51820 \
            ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }} &
          
          AUTOSSH_PID=$!
          echo "AutoSSH PID: $AUTOSSH_PID"
          sleep 5
          
          # Verify tunnel
          if kill -0 $AUTOSSH_PID 2>/dev/null; then
            echo "✅ AutoSSH tunnel running"
            echo "Endpoint: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
          else
            echo "❌ AutoSSH failed to start"
            # Check what went wrong
            ssh \
              -v \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -N \
              -R ${{ secrets.IRAN_SERVER_PORT }}:localhost:51820 \
              ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }} &
            sleep 5
          fi

      - name: Show Configs
        run: |
          echo "=== Client Configurations ==="
          sudo cat ~/wireguard/peer*/peer*.conf 2>/dev/null || \
          sudo find ~/wireguard -name "*.conf" -exec cat {} \;
          
          echo ""
          echo "========================================="
          echo "SERVER: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
          echo "========================================="

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date '+%H:%M:%S')] Checking services..."
            
            # Check Docker
            docker ps | grep wireguard > /dev/null && echo "  WireGuard: ✅" || echo "  WireGuard: ❌"
            
            # Check autossh
            pgrep autossh > /dev/null && echo "  AutoSSH: ✅" || echo "  AutoSSH: ❌"
            
            # Check if tunnel is actually working on remote server
            ssh -o StrictHostKeyChecking=accept-new \
                -o ConnectTimeout=5 \
                -p 22 \
                ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }} \
                "netstat -tuln | grep ${{ secrets.IRAN_SERVER_PORT }}" 2>/dev/null && \
                echo "  Port Forward: ✅" || echo "  Port Forward: ❌"
            
            echo ""
            sleep 60
          done
