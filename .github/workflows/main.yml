name: WireGuard Server + Reverse Tunnel to Iranian Server

on:
  workflow_dispatch:

jobs:
  vpn-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Start WireGuard Server
        run: |
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e SERVERURL=${{ secrets.IRAN_SERVER_IP }} \
            -e SERVERPORT=51820 \
            -e PEERS=5 \
            -e PEERDNS=8.8.8.8 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          sleep 20
          echo "WireGuard server started"

      - name: Create Reverse Tunnel to Iranian Server
        env:
          IRAN_SERVER_IP: ${{ secrets.IRAN_SERVER_IP }}
          IRAN_SERVER_USER: ${{ secrets.IRAN_SERVER_USER }}
          IRAN_SERVER_SSH_KEY: ${{ secrets.IRAN_SERVER_SSH_KEY }}
          IRAN_SERVER_PORT: ${{ secrets.IRAN_SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$IRAN_SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # ایجاد تونل معکوس از رانر به سرور ایران
          # پورت 51820 رانر رو به پورت دلخواه روی سرور ایران فوروارد می‌کنیم
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=3 \
              -R ${{ secrets.IRAN_SERVER_PORT }}:localhost:51820 \
              -N -f \
              $IRAN_SERVER_USER@$IRAN_SERVER_IP
          
          echo "========================================="
          echo "Reverse tunnel created!"
          echo "WireGuard Endpoint: $IRAN_SERVER_IP:${{ secrets.IRAN_SERVER_PORT }}"
          echo "========================================="

      - name: Show Client Configurations
        run: |
          echo "=== Client Configs ==="
          echo "Server: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"
          echo ""
          
          # نمایش کانفیگ‌ها
          sudo find ~/wireguard -name "peer*.conf" -type f | while read conf; do
            echo "----------------------------------------"
            cat "$conf"
            echo "----------------------------------------"
            echo ""
          done
          
          echo "⚠️  Replace Endpoint with: ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.IRAN_SERVER_PORT }}"

      - name: Keep Alive with Monitoring
        run: |
          echo "Server is running..."
          echo "Check every 5 minutes to keep tunnel alive"
          echo ""
          
          for i in $(seq 1 72); do  # 72 * 5 = 360 دقیقه = 6 ساعت
            minutes=$((i * 5))
            echo "[$(date)] Uptime: $minutes minutes"
            
            # Check if WireGuard is running
            docker exec wireguard wg show 2>/dev/null | grep -E "interface|peer|transfer" || echo "WireGuard check failed"
            
            # Check reverse tunnel
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=5 \
                -o ServerAliveInterval=10 \
                -p ${{ secrets.IRAN_SERVER_SSH_PORT }} \
                ${{ secrets.IRAN_SERVER_USER }}@${{ secrets.IRAN_SERVER_IP }} \
                "echo 'Tunnel alive at $(date)'" 2>/dev/null || echo "Tunnel check failed"
            
            sleep 300
          done
