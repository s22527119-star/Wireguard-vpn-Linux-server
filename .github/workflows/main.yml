name: WireGuard with Chisel Tunnel

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Start WireGuard
        run: |
          mkdir -p ~/wireguard
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            -e PEERS=3 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            linuxserver/wireguard:latest
          
          sleep 25

      - name: Setup Chisel Tunnel
        run: |
          # دانلود Chisel
          wget https://github.com/jpillora/chisel/releases/download/v1.9.1/chisel_1.9.1_linux_amd64.gz
          gunzip chisel_1.9.1_linux_amd64.gz
          chmod +x chisel_1.9.1_linux_amd64
          sudo mv chisel_1.9.1_linux_amd64 /usr/local/bin/chisel
          
          # اجرای Chisel client برای UDP forwarding
          chisel client \
            --auth "${{ secrets.CHISEL_USER }}:${{ secrets.CHISEL_PASS }}" \
            ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.CHISEL_PORT }} \
            51820:127.0.0.1:51820/udp &
          
          sleep 5
          echo "Chisel tunnel established"

      - name: Show Configs
        run: |
          sudo cat ~/wireguard/peer*/peer*.conf
          echo "Endpoint: ${{ secrets.IRAN_SERVER_IP }}:51820"

      - name: Keep Alive
        run: |
          sleep 3600
