name: WireGuard with Chisel Tunnel

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Start WireGuard
        run: |
          mkdir -p ~/wireguard
          
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Tehran \
            -e SERVERURL=auto \
            -e SERVERPORT=51820 \
            -e PEERS=3 \
            -e PEERDNS=8.8.8.8 \
            -e INTERNAL_SUBNET=10.13.13.0 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          echo "Waiting for WireGuard to start..."
          sleep 30
          
          echo "=== Container Logs ==="
          docker logs wireguard 2>&1 | tail -20
          
          echo "=== Check WireGuard Status ==="
          docker exec wireguard wg show 2>/dev/null || echo "WireGuard not ready"

      - name: Find Config Files
        run: |
          echo "=== Searching for config files ==="
          
          # چک کردن داخل کانتینر
          echo "--- Inside container: ---"
          docker exec wireguard ls -la /config/ 2>/dev/null || echo "No /config in container"
          
          echo "--- Config directory on host: ---"
          ls -la ~/wireguard/ 2>/dev/null || echo "No files in ~/wireguard"
          
          echo "--- All files recursively: ---"
          sudo find ~/wireguard -type f 2>/dev/null || echo "No files found"
          
          # پیدا کردن کانفیگ‌ها
          echo "--- Searching for .conf files: ---"
          sudo find ~/wireguard -name "*.conf" -type f 2>/dev/null
          
          # نمایش محتوای دایرکتوری
          echo "--- Directory structure: ---"
          sudo find ~/wireguard -type d 2>/dev/null

      - name: Display Configs
        run: |
          echo "========================================="
          echo "Client Configurations"
          echo "========================================="
          
          # روش 1: گرفتن کانفیگ از خروجی Docker logs
          echo "--- From Docker logs: ---"
          docker logs wireguard 2>&1 | grep -A 20 "PEER" || echo "No peer config in logs"
          
          # روش 2: پیدا کردن و نمایش فایل‌ها
          echo "--- Configuration files: ---"
          CONFIGS=$(sudo find ~/wireguard -name "*.conf" -type f 2>/dev/null)
          
          if [ -n "$CONFIGS" ]; then
            echo "$CONFIGS" | while read conf; do
              echo "========================================="
              echo "File: $conf"
              echo "========================================="
              sudo cat "$conf" 2>/dev/null || cat "$conf" 2>/dev/null
              echo ""
            done
          else
            echo "No .conf files found. Trying inside container..."
            docker exec wireguard sh -c "find /config -name '*.conf' -exec cat {} \;" 2>/dev/null
          fi

      - name: Get Server Info
        run: |
          echo "========================================="
          echo "Server Information"
          echo "========================================="
          
          # نمایش وضعیت WireGuard
          echo "=== WireGuard Status ==="
          docker exec wireguard wg show 2>/dev/null || echo "Cannot get status"
          
          # نمایش کلید عمومی سرور
          echo ""
          echo "=== Server Public Key ==="
          docker exec wireguard wg show 2>/dev/null | grep "public key" || \
          docker exec wireguard cat /config/wg0.conf 2>/dev/null | grep -v "PrivateKey" || \
          echo "Could not extract public key"
          
          # IP عمومی
          echo ""
          echo "=== Connection Info ==="
          PUBLIC_IP=$(curl -s --connect-timeout 5 ifconfig.me 2>/dev/null || echo "Unknown")
          echo "Server IP: $PUBLIC_IP"
          echo "Server Port: 51820"

      - name: Setup Chisel Tunnel
        run: |
          # دانلود Chisel
          wget -q https://github.com/jpillora/chisel/releases/download/v1.9.1/chisel_1.9.1_linux_amd64.gz
          gunzip chisel_1.9.1_linux_amd64.gz
          chmod +x chisel_1.9.1_linux_amd64
          sudo mv chisel_1.9.1_linux_amd64 /usr/local/bin/chisel
          
          # اجرای تونل
          chisel client \
            --auth "${{ secrets.CHISEL_USER }}:${{ secrets.CHISEL_PASS }}" \
            ${{ secrets.IRAN_SERVER_IP }}:${{ secrets.CHISEL_PORT }} \
            R:51820:localhost:51820/udp &
          
          sleep 5
          
          echo "Chisel tunnel started"
          echo "WireGuard available at: ${{ secrets.IRAN_SERVER_IP }}:51820"

      - name: Keep Alive
        run: |
          echo "========================================="
          echo "Server is running!"
          echo "========================================="
          
          # Keep alive
          for i in $(seq 1 60); do
            echo "[$(date '+%H:%M:%S')] Alive: $i minutes"
            sleep 60
          done
