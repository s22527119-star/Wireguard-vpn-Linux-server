name: WireGuard Server on GitHub Actions

on:
  workflow_dispatch:

jobs:
  wireguard-server:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup WireGuard Server
        run: |
          # استفاده از پوشه home برای جلوگیری از مشکلات permission
          mkdir -p ~/wireguard/config
          
          # اجرای سرور - کانتینر همه کارها رو انجام میده
          docker run -d \
            --name=wg-server \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=$(id -u) \
            -e PGID=$(id -g) \
            -e TZ=UTC \
            -e SERVERURL=auto \
            -e SERVERPORT=51820 \
            -e PEERS=2 \
            -e PEERDNS=8.8.8.8 \
            -e INTERNAL_SUBNET=10.13.13.0 \
            -p 51820:51820/udp \
            -v ~/wireguard/config:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          echo "Waiting for server to start..."
          sleep 20
          
          echo "=== Container Status ==="
          docker ps | grep wg-server
          
          echo "=== Container Logs ==="
          docker logs wg-server 2>&1 | tail -30

      - name: Show Server Info
        run: |
          PUBLIC_IP=$(curl -s --connect-timeout 10 ifconfig.me 2>/dev/null || echo "unknown")
          
          echo "========================================="
          echo "WireGuard Server is Ready!"
          echo "========================================="
          echo "Endpoint: $PUBLIC_IP:51820"
          echo ""
          
          # نمایش کانفیگ‌ها با sudo برای حل مشکل permission
          echo "=== Client Configurations ==="
          echo ""
          
          # استفاده از sudo برای خواندن فایل‌ها
          if [ -d ~/wireguard/config ]; then
            sudo find ~/wireguard/config -name "peer*.conf" -type f 2>/dev/null | while read conf; do
              echo "----------------------------------------"
              echo "Client Config: $(basename $conf)"
              echo "----------------------------------------"
              sudo cat "$conf" 2>/dev/null
              echo ""
            done
          fi
          
          # نمایش کلید عمومی سرور
          echo "=== Server Details ==="
          docker exec wg-server wg show 2>/dev/null

      - name: Keep Server Alive
        run: |
          PUBLIC_IP=$(curl -s --connect-timeout 10 ifconfig.me 2>/dev/null || echo "unknown")
          
          echo "========================================="
          echo "VPN Server Running!"
          echo "Endpoint: $PUBLIC_IP:51820"
          echo "========================================="
          echo ""
          echo "Server will stay up for 1 hour..."
          echo "Connect your WireGuard clients using the configs above"
          echo ""
          
          # نمایش status هر ۵ دقیقه
          for i in $(seq 1 12); do
            minutes=$((i * 5))
            echo "[$(date)] Server uptime: $minutes minutes"
            docker exec wg-server wg show 2>/dev/null | grep -E "peer:|transfer:" || echo "Status OK"
            sleep 300
          done
