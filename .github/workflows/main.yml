name: WireGuard with AutoSSH Reverse Tunnel

on:
  workflow_dispatch:

jobs:
  vpn-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Start WireGuard
        run: |
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e SERVERURL=${{ secrets.IRAN_SERVER_IP }} \
            -e SERVERPORT=${{ secrets.IRAN_SERVER_PORT }} \
            -e PEERS=10 \
            -e PEERDNS=8.8.8.8 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          sleep 20

      - name: Setup AutoSSH Tunnel
        env:
          IRAN_SERVER_IP: ${{ secrets.IRAN_SERVER_IP }}
          IRAN_SERVER_USER: ${{ secrets.IRAN_SERVER_USER }}
          IRAN_SERVER_SSH_KEY: ${{ secrets.IRAN_SERVER_SSH_KEY }}
          IRAN_SERVER_PORT: ${{ secrets.IRAN_SERVER_PORT }}
        run: |
          # نصب autossh
          sudo apt-get update
          sudo apt-get install -y autossh
          
          # تنظیم کلید SSH
          mkdir -p ~/.ssh
          echo "$IRAN_SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # ایجاد تونل با autossh (اتصال مجدد خودکار)
          AUTOSSH_PIDFILE=/tmp/autossh.pid \
          AUTOSSH_POLL=60 \
          AUTOSSH_GATETIME=30 \
          AUTOSSH_FIRST_POLL=30 \
          autossh -M 0 \
            -o "StrictHostKeyChecking=no" \
            -o "ServerAliveInterval=30" \
            -o "ServerAliveCountMax=3" \
            -o "ExitOnForwardFailure=yes" \
            -o "TCPKeepAlive=yes" \
            -R ${IRAN_SERVER_PORT}:localhost:51820 \
            -N \
            $IRAN_SERVER_USER@$IRAN_SERVER_IP &
          
          echo "AutoSSH tunnel started"
          sleep 10
          
          echo "========================================="
          echo "WireGuard ready at: $IRAN_SERVER_IP:$IRAN_SERVER_PORT"
          echo "========================================="

      - name: Show and Monitor
        run: |
          echo "=== Client Configs ==="
          sudo find ~/wireguard -name "peer*.conf" -exec cat {} \;
          
          echo ""
          echo "========================================="
          echo "Server running - Copy configs above"
          echo "========================================="
          
          # مانیتورینگ با پینگ سرور ایران
          for i in $(seq 1 72); do
            echo "[$(date)] Session alive: $((i*5)) minutes"
            
            # چک کردن تونل
            ps aux | grep autossh | grep -v grep || echo "AutoSSH not running!"
            
            sleep 300
          done
