name: WireGuard Server on GitHub Actions

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  wireguard-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup WireGuard Server
        run: |
          # ایجاد دایرکتوری‌های مورد نیاز
          mkdir -p /tmp/wireguard/config
          mkdir -p /tmp/wireguard/peer_confs
          
          # تنظیم permission
          sudo chown -R 1000:1000 /tmp/wireguard

      - name: Generate Server Keys
        run: |
          # نصب wireguard-tools برای تولید کلید
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          
          # تولید کلیدهای سرور
          SERVER_PRIVATE_KEY=$(wg genkey)
          SERVER_PUBLIC_KEY=$(echo "$SERVER_PRIVATE_KEY" | wg pubkey)
          
          # ذخیره در فایل
          echo "SERVER_PRIVATE_KEY=$SERVER_PRIVATE_KEY" > /tmp/wireguard/keys.env
          echo "SERVER_PUBLIC_KEY=$SERVER_PUBLIC_KEY" >> /tmp/wireguard/keys.env
          
          # نمایش کلید عمومی (برای اتصال کلاینت‌ها)
          echo "========================================="
          echo "Server Public Key (give this to clients):"
          echo "$SERVER_PUBLIC_KEY"
          echo "========================================="

      - name: Set Server Config
        run: |
          source /tmp/wireguard/keys.env
          
          cat > /tmp/wireguard/config/wg0.conf << EOF
          [Interface]
          Address = 10.13.13.1/24
          ListenPort = 51820
          PrivateKey = $SERVER_PRIVATE_KEY
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
          
          # Client 1
          [Peer]
          PublicKey = CLIENT_PUBLIC_KEY_PLACEHOLDER
          AllowedIPs = 10.13.13.2/32
          EOF
          
          echo "Server config created"

      - name: Start WireGuard Server Container
        run: |
          docker run -d \
            --name=wireguard-server \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=UTC \
            -e SERVERURL=github-actions-runner \
            -e SERVERPORT=51820 \
            -e PEERS=1 \
            -e PEERDNS=8.8.8.8 \
            -e INTERNAL_SUBNET=10.13.13.0 \
            -p 51820:51820/udp \
            -v /tmp/wireguard/config:/config \
            -v /tmp/wireguard/peer_confs:/peer_confs \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            --restart=unless-stopped \
            linuxserver/wireguard:latest
          
          echo "Server starting..."
          sleep 15
          
          echo "=== Container Logs ==="
          docker logs wireguard-server 2>&1

      - name: Show Connection Info
        run: |
          echo "========================================="
          echo "WireGuard Server is Running!"
          echo "========================================="
          
          # نمایش IP عمومی رانر
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "Server Public IP: $PUBLIC_IP"
          echo "Server Port: 51820"
          echo ""
          
          # نمایش کلید عمومی سرور
          if [ -f "/tmp/wireguard/keys.env" ]; then
            source /tmp/wireguard/keys.env
            echo "Server Public Key: $SERVER_PUBLIC_KEY"
          fi
          echo ""
          echo "========================================="
          echo "Peer configs:"
          echo "========================================="
          
          # نمایش کانفیگ‌های کلاینت
          if [ -d "/tmp/wireguard/peer_confs" ]; then
            ls -la /tmp/wireguard/peer_confs/
            for conf in /tmp/wireguard/peer_confs/*.conf; do
              if [ -f "$conf" ]; then
                echo "=== $conf ==="
                cat "$conf"
                echo ""
              fi
            done
          fi

      - name: Test Server
        run: |
          echo "Testing server..."
          docker exec wireguard-server wg show
          echo ""
          echo "Server status:"
          docker exec wireguard-server ip addr show wg0

      - name: Keep Server Running
        run: |
          echo "Server is running. Container will stay up..."
          echo "Use these details to connect from external apps:"
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "Endpoint: $PUBLIC_IP:51820"
          
          # برای اینکه رانر زنده بمونه (حداکثر 6 ساعت)
          # می‌تونید یک sleep طولانی بذارید یا کارهای دیگه انجام بدید
