name: WireGuard Server on GitHub Actions

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  wireguard-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install WireGuard Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools

      - name: Generate Server Keys
        run: |
          # تولید کلیدهای سرور
          SERVER_PRIVATE_KEY=$(wg genkey)
          SERVER_PUBLIC_KEY=$(echo "$SERVER_PRIVATE_KEY" | wg pubkey)
          
          # ذخیره در متغیرهای محیطی (بدون فایل)
          echo "SERVER_PRIVATE_KEY=$SERVER_PRIVATE_KEY" >> $GITHUB_ENV
          echo "SERVER_PUBLIC_KEY=$SERVER_PUBLIC_KEY" >> $GITHUB_ENV
          
          # نمایش کلید عمومی
          echo "========================================="
          echo "Server Public Key: $SERVER_PUBLIC_KEY"
          echo "========================================="

      - name: Setup Directories
        run: |
          mkdir -p /tmp/wireguard/config
          mkdir -p /tmp/wireguard/peer_confs
          
          # تغییر مالکیت با sudo
          sudo chown -R $USER:$USER /tmp/wireguard
          sudo chmod -R 755 /tmp/wireguard

      - name: Create Server Config
        run: |
          cat > /tmp/wireguard/config/wg0.conf << EOF
          [Interface]
          Address = 10.13.13.1/24
          ListenPort = 51820
          PrivateKey = $SERVER_PRIVATE_KEY
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
          EOF
          
          echo "Server config created"
          cat /tmp/wireguard/config/wg0.conf | grep -v PrivateKey

      - name: Start WireGuard Server Container
        run: |
          docker run -d \
            --name=wireguard-server \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=UTC \
            -e SERVERURL=auto \
            -e SERVERPORT=51820 \
            -e PEERS=2 \
            -e PEERDNS=8.8.8.8 \
            -e INTERNAL_SUBNET=10.13.13.0 \
            -p 51820:51820/udp \
            -v /tmp/wireguard/config:/config \
            -v /tmp/wireguard/peer_confs:/peer_confs \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          echo "Server starting..."
          sleep 15
          
          echo "=== Container Logs ==="
          docker logs wireguard-server 2>&1

      - name: Get Public IP and Show Connection Info
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          
          echo "========================================="
          echo "WireGuard Server is Running!"
          echo "========================================="
          echo "Server Public IP: $PUBLIC_IP"
          echo "Server Port: 51820"
          echo "Server Public Key: $SERVER_PUBLIC_KEY"
          echo "========================================="
          echo ""
          
          # نمایش کانفیگ‌های کلاینت
          echo "=== Client Configurations ==="
          # صبر کن تا کانفیگ‌ها ساخته بشن
          sleep 10
          
          if [ -d "/tmp/wireguard/peer_confs" ]; then
            find /tmp/wireguard/peer_confs -name "*.conf" -o -name "*.png" | while read file; do
              if [ -f "$file" ]; then
                echo "--- File: $file ---"
                cat "$file" 2>/dev/null || echo "Binary file"
                echo ""
              fi
            done
            
            # نمایش محتوای دایرکتوری config
            echo "=== All config files ==="
            find /tmp/wireguard/config -type f -name "*.conf" -exec echo "---" \; -exec cat {} \; -exec echo "---" \;
          fi

      - name: Test Server
        run: |
          echo "=== Server Status ==="
          docker exec wireguard-server wg show
          echo ""
          echo "=== Network Interfaces ==="
          docker exec wireguard-server ip addr show wg0

      - name: Keep Server Alive
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "========================================="
          echo "SERVER READY!"
          echo "Endpoint: $PUBLIC_IP:51820"
          echo "Server Public Key: $SERVER_PUBLIC_KEY"
          echo "========================================="
          echo ""
          echo "Server will stay up..."
          
          # Keep alive for 1 hour (3600 seconds)
          # می‌تونید این رو تغییر بدید
          sleep 3600
