name: WireGuard Server with Localtonet Tunnel

on:
  workflow_dispatch:

jobs:
  vpn-server:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start WireGuard Server
        run: |
          docker run -d \
            --name=wireguard \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            -e PUID=1000 \
            -e PGID=1000 \
            -e SERVERURL=auto \
            -e SERVERPORT=51820 \
            -e PEERS=3 \
            -e PEERDNS=8.8.8.8 \
            -p 51820:51820/udp \
            -v ~/wireguard:/config \
            --sysctl="net.ipv4.conf.all.src_valid_mark=1" \
            --sysctl="net.ipv4.ip_forward=1" \
            linuxserver/wireguard:latest
          
          sleep 20
          echo "WireGuard server started"

      - name: Create Localtonet Tunnel
        run: |
          # دانلود Localtonet client
          wget https://localtonet.com/download/localtonet-linux-x64.tar.gz
          tar -xzf localtonet-linux-x64.tar.gz
          chmod +x localtonet
          
          # اجرای تونل (نیاز به توکن رایگان از localtonet.com)
          ./localtonet authtoken ${{ secrets.LOCALTONET_TOKEN }}
          
          # ایجاد تونل UDP برای پورت 51820
          ./localtonet udp --port 51820 &
          
          sleep 10
          
          echo "Tunnel created. Use the Localtonet URL to connect"
          
          # نمایش URL تونل
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'

      - name: Show Client Configs
        run: |
          echo "========================================="
          echo "WireGuard Server Ready!"
          echo "========================================="
          
          # نشان دادن کانفیگ‌ها
          sudo cat ~/wireguard/peer*/peer*.conf 2>/dev/null || true
          
          echo ""
          echo "⚠️  Replace Endpoint with Localtonet URL"

      - name: Keep Alive
        run: |
          echo "Server is running..."
          sleep 3600  # 1 ساعت
