name: Multi-Proxy Server for Iran

on:
  workflow_dispatch:

jobs:
  proxy-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install All Proxy Services
        run: |
          sudo apt-get update
          
          # OpenSSH Server
          sudo apt-get install -y openssh-server
          
          # Squid for HTTP Proxy
          sudo apt-get install -y squid
          
          # Dante for SOCKS5
          sudo apt-get install -y dante-server
          
          echo "All packages installed successfully"

      - name: Setup SSH SOCKS5 Proxy
        run: |
          # تنظیم SSH Server
          echo "runner:VPNpass123" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#Port 22/Port 443/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          
          echo "✅ SSH SOCKS5 Proxy ready on port 443"

      - name: Setup HTTP Proxy (Squid)
        run: |
          sudo tee /etc/squid/squid.conf > /dev/null << 'EOF'
          http_port 3128
          
          acl all src 0.0.0.0/0
          http_access allow all
          
          cache deny all
          via off
          forwarded_for delete
          EOF
          
          sudo service squid restart
          echo "✅ HTTP Proxy ready on port 3128"

      - name: Setup SOCKS5 Proxy (Dante)
        run: |
          # پیدا کردن اینترفیس شبکه
          INTERFACE=$(ip route | grep default | awk '{print $5}')
          
          sudo tee /etc/danted.conf > /dev/null << EOF
          logoutput: syslog
          
          internal: ${INTERFACE} port = 1080
          external: ${INTERFACE}
          
          method: none
          
          clientmethod: none
          
          user.privileged: root
          user.unprivileged: nobody
          
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              log: connect disconnect
          }
          
          pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              command: bind connect udpassociate
              log: connect disconnect
          }
          EOF
          
          sudo service danted restart
          echo "✅ SOCKS5 Proxy ready on port 1080"

      - name: Setup Tinyproxy (Backup HTTP Proxy)
        run: |
          sudo apt-get install -y tinyproxy
          
          sudo tee /etc/tinyproxy/tinyproxy.conf > /dev/null << 'EOF'
          User nobody
          Group nogroup
          Port 8888
          Listen 0.0.0.0
          Timeout 600
          Allow 0.0.0.0/0
          DisableViaHeader Yes
          EOF
          
          sudo service tinyproxy restart
          echo "✅ Backup HTTP Proxy ready on port 8888"

      - name: Show All Proxy Details
        run: |
          PUBLIC_IP=$(curl -s --connect-timeout 10 ifconfig.me 2>/dev/null || curl -s icanhazip.com)
          
          echo "=============================================="
          echo "  🌐 MULTI-PROXY SERVER READY"
          echo "=============================================="
          echo ""
          echo "📍 Server IP: $PUBLIC_IP"
          echo ""
          echo "=============================================="
          echo "1️⃣  SSH SOCKS5 Proxy"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 443"
          echo "   Username: runner"
          echo "   Password: VPNpass123"
          echo ""
          echo "   📱 Usage:"
          echo "   ssh -D 1080 -p 443 runner@$PUBLIC_IP"
          echo ""
          echo "=============================================="
          echo "2️⃣  HTTP Proxy (Squid)"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 3128"
          echo "   No authentication"
          echo ""
          echo "   📱 Test:"
          echo "   curl -x http://$PUBLIC_IP:3128 ifconfig.me"
          echo ""
          echo "=============================================="
          echo "3️⃣  SOCKS5 Proxy (Dante)"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 1080"
          echo "   No authentication"
          echo ""
          echo "   📱 Test:"
          echo "   curl --socks5 $PUBLIC_IP:1080 ifconfig.me"
          echo ""
          echo "=============================================="
          echo "4️⃣  TinyProxy (Backup HTTP)"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 8888"
          echo ""
          echo "=============================================="
          echo "  🔧 How to use in browser:"
          echo "=============================================="
          echo ""
          echo "Firefox/Chrome:"
          echo "  Settings → Proxy → Manual"
          echo "  HTTP Proxy: $PUBLIC_IP:3128"
          echo "  Or SOCKS5: $PUBLIC_IP:1080"
          echo ""
          echo "Android (Drony/ProxyDroid):"
          echo "  HTTP: $PUBLIC_IP:3128"
          echo "  SOCKS5: $PUBLIC_IP:1080"
          echo ""
          echo "iOS (Shadowrocket):"
          echo "  Add proxy → Type: HTTP/SOCKS5"
          echo "  Server: $PUBLIC_IP"
          echo "=============================================="

      - name: Keep Server Alive
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          
          echo "========================================="
          echo "🟢 Server Active on $PUBLIC_IP"
          echo "========================================="
          echo ""
          
          for i in {1..72}; do
            hours=$((i * 5 / 60))
            minutes=$(((i * 5) % 60))
            
            echo "[$(date '+%H:%M:%S')] Uptime: ${hours}h ${minutes}m"
            
            # Check SSH
            if systemctl is-active ssh > /dev/null 2>&1; then
              echo "  ✅ SSH (443)"
            else
              echo "  ❌ SSH (443) - Restarting..."
              sudo service ssh restart
            fi
            
            # Check Squid
            if systemctl is-active squid > /dev/null 2>&1; then
              echo "  ✅ Squid HTTP (3128)"
            else
              echo "  ❌ Squid (3128) - Restarting..."
              sudo service squid restart
            fi
            
            # Check Dante
            if systemctl is-active danted > /dev/null 2>&1; then
              echo "  ✅ Dante SOCKS5 (1080)"
            else
              echo "  ❌ Dante (1080) - Restarting..."
              sudo service danted restart
            fi
            
            # Check Tinyproxy
            if systemctl is-active tinyproxy > /dev/null 2>&1; then
              echo "  ✅ Tinyproxy HTTP (8888)"
            else
              echo "  ❌ Tinyproxy (8888) - Restarting..."
              sudo service tinyproxy restart
            fi
            
            echo ""
            sleep 300  # 5 minutes
          done
