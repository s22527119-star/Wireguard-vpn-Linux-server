name: SOCKS5 Proxy Server

on:
  workflow_dispatch:

jobs:
  socks5-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup Microsocks SOCKS5 Proxy
        run: |
          sudo apt-get update
          
          # Install dependencies
          sudo apt-get install -y build-essential git
          
          # Clone and build microsocks
          git clone https://github.com/rofl0r/microsocks.git
          cd microsocks
          make
          sudo make install
          
          # Run SOCKS5 proxy on port 1080 with authentication
          microsocks -1 -u proxyuser -P ProxyPass123 -p 1080 &
          
          sleep 2
          
          # Check if running
          if netstat -tlnp | grep 1080; then
            echo "✅ SOCKS5 Proxy started on port 1080"
          else
            echo "❌ Failed to start"
            exit 1
          fi

      - name: Show Proxy Details
        run: |
          PUBLIC_IP=$(curl -s --connect-timeout 10 ifconfig.me 2>/dev/null || curl -s icanhazip.com)
          
          echo "========================================="
          echo "  ✅ SOCKS5 PROXY READY"
          echo "========================================="
          echo ""
          echo "🌐 Server IP: $PUBLIC_IP"
          echo "🔌 Port: 1080"
          echo "👤 Username: proxyuser"
          echo "🔑 Password: ProxyPass123"
          echo ""
          echo "========================================="
          echo "  📱 HOW TO USE"
          echo "========================================="
          echo ""
          echo "BROWSER (Firefox/Chrome):"
          echo "  Settings → Proxy → Manual"
          echo "  SOCKS5 Host: $PUBLIC_IP"
          echo "  Port: 1080"
          echo "  Username: proxyuser"
          echo "  Password: ProxyPass123"
          echo ""
          echo "ANDROID (Drony/ProxyDroid):"
          echo "  Host: $PUBLIC_IP"
          echo "  Port: 1080"
          echo "  Type: SOCKS5"
          echo "  User: proxyuser"
          echo "  Pass: ProxyPass123"
          echo ""
          echo "iOS (Shadowrocket/Potatso):"
          echo "  Type: SOCKS5"
          echo "  Server: $PUBLIC_IP"
          echo "  Port: 1080"
          echo "  User: proxyuser"
          echo "  Pass: ProxyPass123"
          echo ""
          echo "========================================="

      - name: Keep Alive
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "Server running at $PUBLIC_IP:1080"
          echo ""
          
          for i in {1..72}; do
            echo "[$(date '+%H:%M:%S')] Alive: $((i*5)) min | IP: $PUBLIC_IP"
            
            if pgrep microsocks > /dev/null; then
              echo "  ✅ Proxy running"
            else
              echo "  ❌ Proxy stopped - restarting..."
              microsocks -1 -u proxyuser -P ProxyPass123 -p 1080 &
            fi
            
            sleep 300
          done
