name: Multi-Proxy Server for Iran

on:
  workflow_dispatch:

jobs:
  proxy-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعت
    
    steps:
      - name: Install All Proxy Services
        run: |
          sudo apt-get update
          
          # 1. OpenSSH Server for SOCKS5
          sudo apt-get install -y openssh-server
          
          # 2. Squid for HTTP Proxy
          sudo apt-get install -y squid
          
          # 3. Dante for SOCKS5
          sudo apt-get install -y dante-server
          
          # 4. 3Proxy (lightweight)
          sudo apt-get install -y 3proxy
          
          echo "All packages installed"

      - name: Setup SSH SOCKS5 Proxy
        run: |
          # تنظیم SSH Server
          echo "runner:VPNpass123" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#Port 22/Port 443/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          
          echo "SSH SOCKS5 Proxy ready on port 443"

      - name: Setup HTTP Proxy (Squid)
        run: |
          sudo tee /etc/squid/squid.conf > /dev/null << 'EOF'
          http_port 3128
          
          # Allow all
          acl all src 0.0.0.0/0
          http_access allow all
          
          # Basic settings
          cache deny all
          via off
          forwarded_for delete
          
          # Hide proxy
          request_header_access Allow allow all
          request_header_access Authorization allow all
          request_header_access WWW-Authenticate allow all
          request_header_access Proxy-Authorization allow all
          request_header_access Proxy-Authenticate allow all
          request_header_access Cache-Control allow all
          request_header_access Content-Encoding allow all
          request_header_access Content-Length allow all
          request_header_access Content-Type allow all
          request_header_access Date allow all
          request_header_access Expires allow all
          request_header_access Host allow all
          request_header_access If-Modified-Since allow all
          request_header_access Last-Modified allow all
          request_header_access Location allow all
          request_header_access Pragma allow all
          request_header_access Accept allow all
          request_header_access Accept-Charset allow all
          request_header_access Accept-Encoding allow all
          request_header_access Accept-Language allow all
          request_header_access Content-Language allow all
          request_header_access Mime-Version allow all
          request_header_access Retry-After allow all
          request_header_access Title allow all
          request_header_access Connection allow all
          request_header_access Allow allow all
          request_header_access Proxy-Connection allow all
          request_header_access X-Cache allow all
          request_header_access X-Cache-Lookup allow all
          EOF
          
          sudo service squid restart
          echo "HTTP Proxy ready on port 3128"

      - name: Setup SOCKS5 Proxy (Dante)
        run: |
          sudo tee /etc/danted.conf > /dev/null << 'EOF'
          logoutput: syslog
          
          internal: eth0 port = 1080
          external: eth0
          
          method: none
          
          clientmethod: none
          
          user.privileged: root
          user.unprivileged: nobody
          
          client pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              log: connect disconnect
          }
          
          pass {
              from: 0.0.0.0/0 to: 0.0.0.0/0
              command: bind connect udpassociate
              log: connect disconnect
          }
          EOF
          
          sudo service danted restart
          echo "SOCKS5 Proxy ready on port 1080"

      - name: Setup 3Proxy (Alternative)
        run: |
          sudo tee /etc/3proxy/3proxy.cfg > /dev/null << 'EOF'
          nserver 8.8.8.8
          nserver 1.1.1.1
          
          nscache 65536
          timeouts 1 5 30 60 180 1800 15 60
          
          users $/etc/3proxy/.proxyauth
          
          daemon
          log /var/log/3proxy.log D
          logformat "- +_L%t.%. %N.%p %E %U %C:%c %R:%r %O %I %h %T"
          rotate 30
          
          auth none
          
          # HTTP Proxy on port 8080
          proxy -p8080
          
          # SOCKS5 on port 1081
          socks -p1081
          EOF
          
          sudo service 3proxy restart
          echo "3Proxy ready (HTTP:8080, SOCKS5:1081)"

      - name: Show All Proxy Details
        run: |
          PUBLIC_IP=$(curl -s --connect-timeout 10 ifconfig.me 2>/dev/null || curl -s icanhazip.com)
          
          echo "=============================================="
          echo "  🌐 MULTI-PROXY SERVER READY"
          echo "=============================================="
          echo ""
          echo "📍 Server IP: $PUBLIC_IP"
          echo ""
          echo "=============================================="
          echo "1️⃣  SSH SOCKS5 Proxy"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 443"
          echo "   Username: runner"
          echo "   Password: VPNpass123"
          echo ""
          echo "   📱 Usage:"
          echo "   ssh -D 1080 -p 443 runner@$PUBLIC_IP"
          echo "   Or use in browser: SOCKS5 proxy settings"
          echo ""
          echo "=============================================="
          echo "2️⃣  HTTP Proxy (Squid)"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 3128"
          echo "   No authentication"
          echo ""
          echo "   📱 Usage:"
          echo "   curl -x http://$PUBLIC_IP:3128 ifconfig.me"
          echo "   Or set in browser/system proxy settings"
          echo ""
          echo "=============================================="
          echo "3️⃣  SOCKS5 Proxy (Dante)"
          echo "=============================================="
          echo "   Host: $PUBLIC_IP"
          echo "   Port: 1080"
          echo "   No authentication"
          echo ""
          echo "   📱 Usage:"
          echo "   curl --socks5 $PUBLIC_IP:1080 ifconfig.me"
          echo "   Or use with proxychains"
          echo ""
          echo "=============================================="
          echo "4️⃣  3Proxy (Backup)"
          echo "=============================================="
          echo "   HTTP: $PUBLIC_IP:8080"
          echo "   SOCKS5: $PUBLIC_IP:1081"
          echo ""
          echo "=============================================="
          echo "  📋 Connection Test Commands"
          echo "=============================================="
          echo ""
          echo "# Test HTTP Proxy:"
          echo "curl -x http://$PUBLIC_IP:3128 http://ifconfig.me"
          echo ""
          echo "# Test SOCKS5:"
          echo "curl --socks5 $PUBLIC_IP:1080 http://ifconfig.me"
          echo ""
          echo "# Test SSH Tunnel:"
          echo "ssh -D 9999 -p 443 runner@$PUBLIC_IP"
          echo "Then set browser SOCKS5 proxy to localhost:9999"
          echo ""
          echo "=============================================="

      - name: Keep Server Alive
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          
          echo "========================================="
          echo "Server Active on $PUBLIC_IP"
          echo "========================================="
          echo ""
          echo "Services Status:"
          echo "-----------------"
          
          # Check all services
          for i in {1..72}; do
            hours=$((i * 5 / 60))
            minutes=$(((i * 5) % 60))
            
            echo "[$(date '+%H:%M:%S')] Uptime: ${hours}h ${minutes}m"
            
            # Check SSH
            if systemctl is-active ssh > /dev/null 2>&1; then
              echo "  SSH (443): ✅ Running"
            else
              echo "  SSH (443): ❌ Stopped"
            fi
            
            # Check Squid
            if systemctl is-active squid > /dev/null 2>&1; then
              echo "  HTTP (3128): ✅ Running"
            else
              echo "  HTTP (3128): ❌ Stopped"
            fi
            
            # Check Dante
            if systemctl is-active danted > /dev/null 2>&1; then
              echo "  SOCKS5 (1080): ✅ Running"
            else
              echo "  SOCKS5 (1080): ❌ Stopped"
            fi
            
            echo ""
            sleep 300  # 5 minutes
          done
